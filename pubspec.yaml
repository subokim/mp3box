name: mp3box
description: "Youtube to Mp3 Converter."
publish_to: 'none' 

version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  path: ^1.9.1
  http: ^1.6.0
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
